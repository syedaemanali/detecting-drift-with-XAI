global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "drift_detection_mlops"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "drift_pipeline"
    scrape_interval: 30s
    static_configs:
      - targets: ["metrics_api:8000"]
    metrics_path: "/metrics"

  - job_name: "mlflow"
    scrape_interval: 60s
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: "/metrics"